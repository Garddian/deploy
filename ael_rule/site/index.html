<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AEL Rule</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe4;
        --card: #fffaf2;
        --text: #1f2933;
        --accent: #b5542f;
        --border: #e7d8bf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(181, 84, 47, 0.14), transparent 40%),
          linear-gradient(180deg, #fbf6ed 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(720px, 100%);
        padding: 40px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(31, 41, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AEL Rule</h1>
      <p>Le service est coucou en <strong>HTTPS</strong> via Traefik et ngrok.</p>
    </main>
  </body>
</html>
